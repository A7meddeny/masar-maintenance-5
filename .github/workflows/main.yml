name: بناء تطبيق مسار (APK)

# يعمل تلقائياً عند كل رفع، ويمكن تشغيله يدوياً من تبويب Actions
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: جلب الكود
        uses: actions/checkout@v4

      - name: تجهيز Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: تجهيز Android SDK
        uses: android-actions/setup-android@v3

      - name: صلاحية تنفيذ gradlew
        run: chmod +x gradlew

      - name: بناء نسخة Debug (قابلة للتثبيت مباشرة)
        run: ./gradlew assembleDebug --stacktrace

      - name: رفع ملف APK كمُخرَج
        uses: actions/upload-artifact@v4
        with:
          name: MasarApp-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
